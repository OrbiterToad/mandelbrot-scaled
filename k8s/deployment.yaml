apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandelbrot
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mandelbrot
  template:
    metadata:
      labels:
        app: mandelbrot
    spec:
      containers:
        - name: mandelbrot
          image: mandelbrot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: 512Mi   # NumPy arrays per render ~100 MB at 1920x1080
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
