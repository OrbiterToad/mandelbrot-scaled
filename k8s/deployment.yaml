apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandelbrot-worker
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mandelbrot-worker
  template:
    metadata:
      labels:
        app: mandelbrot-worker
    spec:
      containers:
        - name: mandelbrot-worker
          image: mandelbrot:latest
          imagePullPolicy: Never
          command: ["gunicorn", "server:app",
                    "--bind", "0.0.0.0:80",
                    "--workers", "2",
                    "--timeout", "120"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 128Mi
              cpu: 2000m
            limits:
              memory: 512Mi   # NumPy arrays per render ~100 MB at 1920x1080
              cpu: 4000m
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 5
