apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandelbrot-coordinator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mandelbrot-coordinator
  template:
    metadata:
      labels:
        app: mandelbrot-coordinator
    spec:
      containers:
        - name: mandelbrot-coordinator
          image: mandelbrot:latest
          imagePullPolicy: Never
          command: ["gunicorn", "coordinator:app",
                    "--bind", "0.0.0.0:80",
                    "--workers", "2",
                    "--timeout", "120"]
          env:
            - name: WORKER_URL
              value: "http://mandelbrot-worker"
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 64Mi
              cpu: 250m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
